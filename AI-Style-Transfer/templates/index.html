<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AI实时风格迁移系统</title>
    <style>
        body { max-width: 1000px; margin: 0 auto; padding: 20px; font-family: Arial; }
        /* ========== 你的学号和姓名 固定显示 ========== */
        .user-info {
            font-size: 22px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 20px;
            padding: 10px;
            border-left: 5px solid #3498db;
        }
        .container { display: flex; gap: 20px; margin-top:20px; }
        .box { flex:1; border:1px solid #ddd; padding:15px; border-radius:8px; }
        img { max-width:100%; border-radius:5px; }
        button { padding:10px 20px; background:#3498db; color:white; border:none; border-radius:5px; cursor:pointer; }
        input { width:100%; margin:10px 0; }
    </style>
</head>
<body>
    <h1>AI前沿项目：实时图像风格迁移</h1>
    
    <!-- ================== 必须显示：你的学号 + 姓名 ================== -->
    <div class="user-info">
        学号：202XXXXXXX<br>
        姓名：张三
    </div>

    <div class="container">
        <div class="box">
            <h3>上传图片</h3>
            <input type="file" id="upload" accept="image/*">
            <img id="inputImg" style="display:none;">
            <p>风格强度：<span id="strengthText">0.8</span></p>
            <input type="range" id="strength" min="0.1" max="1" step="0.1" value="0.8">
            <button onclick="startTransfer()">开始AI风格迁移</button>
        </div>
        <div class="box">
            <h3>AI生成结果</h3>
            <img id="outputImg">
        </div>
    </div>

    <script>
        let upload = document.getElementById('upload');
        let inputImg = document.getElementById('inputImg');
        let outputImg = document.getElementById('outputImg');
        let strength = document.getElementById('strength');
        let strengthText = document.getElementById('strengthText');

        strength.addEventListener('input', ()=>{ strengthText.textContent = strength.value; });

        upload.onchange = function(e) {
            let reader = new FileReader();
            reader.onload = function(ev) {
                inputImg.src = ev.target.result;
                inputImg.style.display = 'block';
            }
            reader.readAsDataURL(e.target.files[0]);
        }

        async function startTransfer() {
            let formData = new FormData();
            formData.append('image', inputImg.src);
            formData.append('strength', strength.value);

            let res = await fetch('/transfer', { method:'POST', body:formData });
            let data = await res.json();
            outputImg.src = data.result;
        }
    </script>
</body>
</html>
